<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Z1NTY HUB // Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #0af;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 170, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 170, 255, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: bgMove 20s linear infinite;
            display: flex;
            flex-direction: column;
        }
        @keyframes bgMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }
        .container { max-width: 600px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        .tg-link {
            position: absolute;
            top: 0;
            right: 0;
            color: #0af;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid #0af;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px #0af;
            text-shadow: 0 0 8px #0af;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            z-index: 20;
            animation: neonPulse 1.5s infinite alternate;
        }
        .tg-link:hover {
            background: #0af;
            color: #000;
            box-shadow: 0 0 30px #0af;
            transform: scale(1.05);
        }

        .glitch-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #0af;
            text-shadow: 
                0 0 10px #0af,
                0 0 20px #08c,
                0 0 40px #046;
            border-left: 5px solid #0af;
            padding-left: 20px;
            margin-bottom: 30px;
            margin-top: 70px;
            position: relative;
            animation: glitch 3s infinite, neonPulse 2s infinite alternate;
            width: fit-content;
            text-transform: uppercase;
        }
        .glitch-logo::before,
        .glitch-logo::after {
            content: 'Z1NTY SCRIPTS';
            position: absolute;
            top: 0;
            left: 25px;
            width: 100%;
            height: 100%;
            opacity: 0.5;
        }
        .glitch-logo::before {
            color: #0af;
            z-index: -1;
            animation: glitch-anim-1 0.4s infinite alternate-reverse;
        }
        .glitch-logo::after {
            color: #f0a;
            z-index: -2;
            animation: glitch-anim-2 0.3s infinite alternate-reverse;
        }
        @keyframes glitch-anim-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 30% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(50% 0 20% 0); transform: translate(2px, -1px); }
            60% { clip-path: inset(10% 0 60% 0); transform: translate(-1px, 1px); }
            80% { clip-path: inset(80% 0 5% 0); transform: translate(1px, -2px); }
        }
        @keyframes glitch-anim-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 1px); }
            60% { clip-path: inset(30% 0 40% 0); transform: translate(1px, 2px); }
            80% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, -1px); }
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        .welcome-text {
            font-size: 48px;
            font-weight: 300;
            color: #fff;
            text-shadow: 
                0 0 20px #0af,
                0 0 40px #08c;
            letter-spacing: 8px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards, textPulse 2s infinite alternate;
            word-break: break-word;
        }
        @keyframes textPulse {
            from { text-shadow: 0 0 20px #0af, 0 0 40px #08c; }
            to { text-shadow: 0 0 30px #0af, 0 0 60px #0af, 0 0 80px #08c; }
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 360px;
            opacity: 0;
            animation: fadeInUp 0.8s 0.2s ease forwards;
        }
        .neon-glass {
            display: block;
            padding: 18px 20px;
            background: rgba(0, 170, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #0af;
            border: 1.5px solid rgba(0, 170, 255, 0.5);
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 0 20px rgba(0, 170, 255, 0.2),
                inset 0 0 10px rgba(0, 170, 255, 0.1);
            text-shadow: 0 0 15px #0af;
            position: relative;
            overflow: hidden;
            animation: btnPulse 2s infinite alternate;
        }
        @keyframes btnPulse {
            from { box-shadow: 0 0 15px #0af, inset 0 0 5px #0af; }
            to { box-shadow: 0 0 30px #0af, inset 0 0 15px #0af; }
        }
        .neon-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 170, 255, 0.4), transparent);
            transition: left 0.5s;
        }
        .neon-glass:hover {
            background: #0af;
            color: #000;
            border-color: #fff;
            box-shadow: 
                0 0 50px #0af,
                inset 0 0 20px #fff;
            text-shadow: none;
            transform: scale(1.03);
            letter-spacing: 6px;
        }
        .neon-glass:hover::before {
            left: 100%;
        }

        .footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #046;
            font-size: 12px;
            letter-spacing: 3px;
            border-top: 1px solid rgba(0, 170, 255, 0.2);
            opacity: 0;
            animation: fadeIn 0.8s 0.5s ease forwards, neonPulse 3s infinite alternate;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes neonPulse {
            from { opacity: 0.8; text-shadow: 0 0 5px #0af; }
            to { opacity: 1; text-shadow: 0 0 20px #0af, 0 0 40px #0af; }
        }

        @media (max-width: 480px) {
            .glitch-logo { font-size: 24px; }
            .welcome-text { font-size: 32px; letter-spacing: 4px; }
            .neon-glass { font-size: 18px; padding: 14px; }
            .tg-link { font-size: 14px; padding: 8px 16px; }
        }
    </style>
</head>
